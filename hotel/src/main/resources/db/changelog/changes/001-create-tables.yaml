databaseChangeLog:
  - changeSet:
      id: 001-create-tables
      author: hotel
      changes:
        - createTable:
            tableName: room
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: number
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: available
                  type: BOOLEAN
                  constraints:
                    nullable: false

        - createTable:
            tableName: guest
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

        - createTable:
            tableName: staff
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: salary
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

        - createTable:
            tableName: service
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

        - createTable:
            tableName: booking
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: guest_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: room_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: check_in
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: check_out
                  type: DATE
                  constraints:
                    nullable: false
        - createTable:
            tableName: invoice
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: total_amount
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: is_paid
                  type: BOOLEAN
              - column:
                  name: booking_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
              - addForeignKeyConstraint:
                  baseTableName: invoice
                  baseColumnNames: booking_id
                  referencedTableName: booking
                  referencedColumnNames: id
                  constraintName: fk_invoice_booking

        - createTable:
            tableName: booking_service
            columns:
              - column:
                  name: booking_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: service_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - addForeignKeyConstraint:
                  baseTableName: booking_service
                  baseColumnNames: booking_id
                  referencedTableName: booking
                  referencedColumnNames: id
                  constraintName: fk_bs_booking
              - addForeignKeyConstraint:
                  baseTableName: booking_service
                  baseColumnNames: service_id
                  referencedTableName: service
                  referencedColumnNames: id
                  constraintName: fk_bs_service